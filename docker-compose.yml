services:
  # 1. Database
  db:
    image: postgres:15-alpine
    container_name: courtmate_db
    environment:
      POSTGRES_DB: courtmate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - courtmate_network

  # 2. B2C Service (Node.js)
  b2c-service:
    build: ./courtmate-b2c-service
    container_name: courtmate_b2c
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/courtmate?schema=public
      PORT: 3000
    tty: true
    stdin_open: true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - courtmate_network

  # 3. B2B Service (Java Spring Boot)
  b2b-service:
    build: ./courtmate-b2b-service
    container_name: courtmate_b2b
    expose:
      - "8081"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/courtmate
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - courtmate_network

  # 4. AI Pricing Service (Python FastAPI)
  pricing-ai:
    build: ./courtmate-pricing-ai
    container_name: courtmate_ai
    expose:
      - "8000"
    networks:
      - courtmate_network

  # 5. Frontend (Next.js)
  frontend:
    build: ./courtmate-web
    container_name: courtmate_frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
    networks:
      - courtmate_network

  # 6. API Gateway (Nginx)
  gateway:
    image: nginx:alpine
    container_name: courtmate_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - b2c-service
      - b2b-service
      - pricing-ai
    networks:
      - courtmate_network

  # 7. MinIO (Object Storage)
  minio:
    image: minio/minio
    container_name: courtmate_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - courtmate_network

  # 8. MinIO Client (for bucket initialization)
  minio-init:
    image: minio/mc
    container_name: courtmate_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/courtmate-images --ignore-existing;
      mc anonymous set public myminio/courtmate-images;
      exit 0;
      "
    networks:
      - courtmate_network

networks:
  courtmate_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: