spring:
  application:
    name: courtmate-b2b-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/courtmate_b2b}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081
